<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers – Nexus ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-orange-50 font-['Inter'] text-gray-800">

  <div id="sidebar-container" data-active="suppliers"></div>

  <div class="ml-64 min-h-screen flex flex-col main-content">
    <header class="sticky top-0 z-30 bg-white border-b border-orange-100 px-6 py-4 flex items-center justify-between shadow-sm">
      <div>
        <div class="flex items-center gap-2 text-sm text-gray-400 mb-0.5">
          <a href="../dashboard.html" class="hover:text-orange-500">Dashboard</a>
          <span>/</span><span class="text-gray-600 font-medium">Inventory</span>
          <span>/</span><span class="text-orange-500 font-medium">Suppliers</span>
        </div>
        <h2 class="font-bold text-gray-900 text-lg">Supplier Management</h2>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="openModal('addSupModal')" class="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white text-sm font-semibold rounded-xl hover:from-orange-600 hover:to-amber-600 shadow-sm transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Add Supplier
        </button>
        <div class="w-9 h-9 bg-gradient-to-br from-orange-500 to-amber-400 rounded-full flex items-center justify-center text-white text-sm font-bold">A</div>
      </div>
    </header>

    <main class="flex-1 p-6 page-enter">
      <!-- Stats -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-2xl p-4 border border-orange-100 shadow-sm flex items-center gap-3">
          <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/></svg>
          </div>
          <div><p class="text-2xl font-bold text-gray-900">24</p><p class="text-xs text-gray-500">Total Suppliers</p></div>
        </div>
        <div class="bg-white rounded-2xl p-4 border border-orange-100 shadow-sm flex items-center gap-3">
          <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div><p class="text-2xl font-bold text-gray-900">19</p><p class="text-xs text-gray-500">Active Suppliers</p></div>
        </div>
        <div class="bg-white rounded-2xl p-4 border border-orange-100 shadow-sm flex items-center gap-3">
          <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          </div>
          <div><p class="text-2xl font-bold text-gray-900">7</p><p class="text-xs text-gray-500">Pending Orders</p></div>
        </div>
        <div class="bg-white rounded-2xl p-4 border border-orange-100 shadow-sm flex items-center gap-3">
          <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div><p class="text-2xl font-bold text-gray-900">$186K</p><p class="text-xs text-gray-500">Total Spend (May)</p></div>
        </div>
      </div>

      <!-- Supplier Cards Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-6" id="supplierGrid"></div>

      <!-- Supplier Table -->
      <div class="bg-white rounded-2xl border border-orange-100 shadow-sm overflow-hidden">
        <div class="flex flex-col md:flex-row md:items-center justify-between px-5 py-4 gap-3 border-b border-gray-50">
          <h3 class="font-bold text-gray-900">All Suppliers</h3>
          <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
            <input id="supSearch" type="text" placeholder="Search suppliers..." class="pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-gray-50 w-52">
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full data-table text-sm" id="supTable">
            <thead>
              <tr class="bg-amber-50 text-gray-500 text-xs font-semibold uppercase tracking-wider">
                <th class="px-5 py-3 text-left">Supplier</th>
                <th class="px-5 py-3 text-left">Contact</th>
                <th class="px-5 py-3 text-left">Category</th>
                <th class="px-5 py-3 text-left">Location</th>
                <th class="px-5 py-3 text-right">Total Orders</th>
                <th class="px-5 py-3 text-right">Spend (YTD)</th>
                <th class="px-5 py-3 text-left">Rating</th>
                <th class="px-5 py-3 text-left">Status</th>
                <th class="px-5 py-3 text-left">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50" id="supBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Supplier Modal -->
  <div id="addSupModal" class="modal-backdrop hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-40">
    <div class="modal-box bg-white rounded-2xl shadow-2xl w-full max-w-lg">
      <div class="flex items-center justify-between p-5 border-b border-gray-100">
        <h3 class="font-bold text-gray-900 text-lg">Add New Supplier</h3>
        <button onclick="closeModal('addSupModal')" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-gray-100 text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form onsubmit="addSupplier(event)" class="p-5 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Company Name *</label>
          <input type="text" id="supName" required placeholder="e.g. TechSource Global" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5">Contact Person *</label>
            <input type="text" id="supContact" required placeholder="John Smith" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5">Email *</label>
            <input type="email" id="supEmail" required placeholder="supplier@email.com" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5">Phone</label>
            <input type="tel" placeholder="+1 555 000 0000" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5">Category</label>
            <select class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white">
              <option>Electronics</option>
              <option>Accessories</option>
              <option>Furniture</option>
              <option>Software</option>
              <option>Office Supplies</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Location / Country</label>
          <input type="text" placeholder="United States" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal('addSupModal')" class="flex-1 py-2.5 border border-gray-200 text-gray-600 text-sm font-semibold rounded-xl hover:bg-gray-50">Cancel</button>
          <button type="submit" class="flex-1 py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white text-sm font-semibold rounded-xl hover:from-orange-600 hover:to-amber-600">Add Supplier</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/sidebar.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    const suppliers = [
      { name:'TechSource Global', contact:'Mark Reynolds', email:'mark@techsource.com', cat:'Electronics', location:'USA', orders:142, spend:84200, rating:5, status:'active' },
      { name:'Innovate Parts Co', contact:'Lisa Park', email:'lisa@innovateparts.com', cat:'Accessories', location:'South Korea', orders:98, spend:42600, rating:4, status:'active' },
      { name:'Alpha Supplies', contact:'Ahmed Hassan', email:'ahmed@alphasup.com', cat:'Accessories', location:'UAE', orders:76, spend:31800, rating:4, status:'active' },
      { name:'Office World', contact:'Sarah Brown', email:'sarah@officeworld.com', cat:'Furniture', location:'UK', orders:54, spend:22500, rating:5, status:'active' },
      { name:'Microsoft Corp', contact:'Partner Portal', email:'partner@microsoft.com', cat:'Software', location:'USA', orders:12, spend:5160, rating:5, status:'active' },
      { name:'Delta Tech Parts', contact:'Carlos Diaz', email:'carlos@deltatech.mx', cat:'Electronics', location:'Mexico', orders:34, spend:18900, status:'inactive', rating:3 }
    ];

    const catColors = {Electronics:'bg-blue-50 text-blue-700', Accessories:'bg-orange-50 text-orange-700', Furniture:'bg-amber-50 text-amber-700', Software:'bg-purple-50 text-purple-700', 'Office Supplies':'bg-green-50 text-green-700'};
    const supIconColors = ['from-orange-400 to-amber-400','from-blue-400 to-indigo-400','from-emerald-400 to-teal-400','from-purple-400 to-pink-400','from-red-400 to-orange-400','from-cyan-400 to-blue-400'];

    function stars(n) {
      return Array.from({length:5},(_,i)=>`<svg class="w-3.5 h-3.5 ${i<n?'text-amber-400':'text-gray-200'}" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('');
    }

    function renderCards() {
      document.getElementById('supplierGrid').innerHTML = suppliers.slice(0,3).map((s,i) => `
        <div class="bg-white rounded-2xl p-5 border border-orange-100 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-start gap-3 mb-4">
            <div class="w-12 h-12 bg-gradient-to-br ${supIconColors[i]} rounded-xl flex items-center justify-center text-white font-bold text-lg flex-shrink-0">${s.name[0]}</div>
            <div>
              <h4 class="font-bold text-gray-900">${s.name}</h4>
              <p class="text-xs text-gray-400">${s.contact} · ${s.location}</p>
              <div class="flex mt-1">${stars(s.rating)}</div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-orange-50 rounded-xl p-3"><p class="text-xs text-gray-400 mb-0.5">Total Orders</p><p class="font-bold text-gray-900">${s.orders}</p></div>
            <div class="bg-amber-50 rounded-xl p-3"><p class="text-xs text-gray-400 mb-0.5">YTD Spend</p><p class="font-bold text-gray-900">$${(s.spend/1000).toFixed(1)}K</p></div>
          </div>
          <div class="flex items-center justify-between">
            <span class="${catColors[s.cat]||'bg-gray-100 text-gray-600'} px-2.5 py-1 rounded-lg text-xs font-semibold">${s.cat}</span>
            <button onclick="showToast('Opening ${s.name} profile','info')" class="text-xs text-orange-500 font-semibold hover:underline">View Details →</button>
          </div>
        </div>`).join('');
    }

    function renderTable() {
      document.getElementById('supBody').innerHTML = suppliers.map((s,i) => `
        <tr class="hover:bg-orange-50/30">
          <td class="px-5 py-3.5">
            <div class="flex items-center gap-2.5">
              <div class="w-8 h-8 bg-gradient-to-br ${supIconColors[i%supIconColors.length]} rounded-lg flex items-center justify-center text-white text-sm font-bold">${s.name[0]}</div>
              <span class="font-semibold text-gray-800">${s.name}</span>
            </div>
          </td>
          <td class="px-5 py-3.5"><div><p class="text-sm text-gray-700">${s.contact}</p><p class="text-xs text-gray-400">${s.email}</p></div></td>
          <td class="px-5 py-3.5"><span class="${catColors[s.cat]||'bg-gray-100 text-gray-600'} px-2.5 py-1 rounded-lg text-xs font-semibold">${s.cat}</span></td>
          <td class="px-5 py-3.5 text-gray-500 text-sm">${s.location}</td>
          <td class="px-5 py-3.5 text-right font-semibold text-gray-900">${s.orders}</td>
          <td class="px-5 py-3.5 text-right font-semibold text-gray-900">$${s.spend.toLocaleString()}</td>
          <td class="px-5 py-3.5"><div class="flex">${stars(s.rating)}</div></td>
          <td class="px-5 py-3.5"><span class="${s.status==='active'?'badge-active':'badge-inactive'} px-2.5 py-0.5 rounded-full text-xs font-semibold">${s.status==='active'?'Active':'Inactive'}</span></td>
          <td class="px-5 py-3.5">
            <div class="flex items-center gap-1">
              <button onclick="showToast('Opening supplier details','info')" class="p-1.5 rounded-lg hover:bg-orange-50 text-gray-400 hover:text-orange-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
              <button onclick="showToast('Edit mode enabled','info')" class="p-1.5 rounded-lg hover:bg-amber-50 text-gray-400 hover:text-amber-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
            </div>
          </td>
        </tr>`).join('');
    }

    function addSupplier(e) {
      e.preventDefault();
      const name = document.getElementById('supName').value;
      suppliers.unshift({ name, contact: document.getElementById('supContact').value, email: document.getElementById('supEmail').value, cat:'Electronics', location:'Unknown', orders:0, spend:0, rating:3, status:'active' });
      renderCards(); renderTable();
      closeModal('addSupModal');
      showToast(`${name} added successfully`, 'success');
      e.target.reset();
    }

    renderCards();
    renderTable();
    initTableSearch('supSearch','supTable');
  </script>
</body>
</html>
